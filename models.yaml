# Model manifest. Each entry: name -> list of {url, dest, dest_type}
# dest_type: checkpoint | vae | lora | clip | unet | diffusion_model | text_encoder
# Run: bash setup.sh <name>   (or: bash setup.sh sdxl flux-schnell)

sdxl:
  - url: https://huggingface.co/stabilityai/stable-diffusion-xl-base-1.0/resolve/main/sd_xl_base_1.0.safetensors
    dest: sd_xl_base_1.0.safetensors
    dest_type: checkpoint

flux-schnell:
  - url: https://huggingface.co/black-forest-labs/FLUX.1-schnell/resolve/main/flux1-schnell.safetensors
    dest: flux1-schnell.safetensors
    dest_type: diffusion_model
  - url: https://huggingface.co/black-forest-labs/FLUX.1-schnell/resolve/main/ae.safetensors
    dest: ae.safetensors
    dest_type: vae
  - url: https://huggingface.co/comfyanonymous/flux_text_encoders/resolve/main/clip_l.safetensors
    dest: clip_l.safetensors
    dest_type: text_encoder
  - url: https://huggingface.co/comfyanonymous/flux_text_encoders/resolve/main/t5xxl_fp8_e4m3fn.safetensors
    dest: t5xxl_fp8_e4m3fn.safetensors
    dest_type: text_encoder
